services:
  postgres:
    image: postgres:15-alpine
    container_name: sensor_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: sensor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sensor_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sensor_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7-alpine
    container_name: sensor_influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: secret123
      DOCKER_INFLUXDB_INIT_ORG: sensor_org
      DOCKER_INFLUXDB_INIT_BUCKET: sensor_bucket
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: supersecrettoken
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - sensor_network

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: sensor_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - sensor_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sensor_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_started
      mosquitto:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - sensor_network

networks:
  sensor_network:
    driver: bridge

volumes:
  postgres_data:
  influxdb_data:
  mosquitto_data:
  mosquitto_logs: